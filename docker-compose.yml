services:
  prueba: 
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: Leonardo
      POSTGRES_PASSWORD: Leonardo123
      POSTGRES_DB: prueba
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: python_backend
    restart: always
    depends_on:
      - prueba
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgresql://Leonardo:Leonardo123@prueba:5432/prueba
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media

  frontend:
    build: ./frontend
    container_name: react_native_app
    restart: always
    depends_on:
      - backend
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "8081:8081" 
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  # --- AQUÍ ESTÁ EL NUEVO SERVICIO PARA VER TUS DATOS ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: leonardo@tuapp.com
      PGADMIN_DEFAULT_PASSWORD: LeonardoAdmin123
    ports:
      - "5050:80"
    depends_on:
      - prueba

volumes:
  postgres_data: